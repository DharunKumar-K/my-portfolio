<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Buds</title>
	<link rel="stylesheet" href="style .css">
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: Arial, sans-serif;
			background: linear-gradient(135deg, #e8f5e9, #ffffff);
			color: #1b5e20;
		}

		.card {
			text-align: center;
			padding: 2rem 3rem;
			border-radius: 20px;
			background: rgba(255, 255, 255, 0.85);
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
		}

		h1 {
			margin: 0;
			font-size: 3rem;
			letter-spacing: 0.08em;
		}

		p {
			margin: 0.75rem 0 0;
			font-size: 1.1rem;
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>Buds==SUBIKAVYA</h1>
		<p>Fresh and simple display.</p>
	</main>

</body>
</html>
